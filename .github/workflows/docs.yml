name: Docs
on:
  pull_request:
    branches:
      - main
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.71.3
          environments: >-
            docs
      - name: Build Docs
        run: |
          pixi run build-docs
      - uses: actions/upload-artifact@v7
        with:
          name: docs
          path: site/
