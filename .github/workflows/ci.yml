defaults:
      run:
        shell: bash -el {0}

name: CI
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        suite:
          - environment: test
            task: test
          - environment: mindeps
            task: test
          - environment: test-c
            task: test-c
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.71.3
          environments: >-
            default
            ${{ matrix.suite.environment }}
      - name: Run tests
        run: pixi run -e ${{ matrix.suite.environment }} ${{ matrix.suite.task }} --junit-xml=test-${{ matrix.os }}-Env-${{ matrix.suite.environment }}.xml
      - uses: codecov/codecov-action@v5

  test-julia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.71.3
          environments: >-
            default
            test-julia
      - name: Run Julia backend tests
        run: pixi run test-julia --junit-xml=test-ubuntu-latest-Env-test-julia.xml
      - uses: codecov/codecov-action@v5

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
