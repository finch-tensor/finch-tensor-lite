name: Benchmark
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.64.0
          environments: >-
            default
            ${{ matrix.environment }}
      - name: Install package
        run: |
          poetry install --extras benchmark --extras test
      - name: Install debug symbols
        run: |
          sudo apt-get update && sudo apt-get install -y libc6-dbg
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime,memory
          run: |
            poetry run pytest benchmarks/ --codspeed -vvv

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
