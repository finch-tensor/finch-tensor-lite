name: Benchmark
jobs:
  benchmark:
    runs-on: codspeed-macro
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Configure Poetry
        run: |
            poetry env use python3.12
      - name: Install package
        run: |
          poetry install --extras benchmark --extras test
      - name: Install debug symbols
        run: |
          sudo apt-get update && sudo apt-get install -y libc6-dbg
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation,memory
          run: |
            poetry run pytest benchmarks/ --codspeed -vvv

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
