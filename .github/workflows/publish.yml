name: Publish
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install build toml
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.71.3
      - name: Get version
        run: |
            VERSION=$(python -c 'import toml; print("v" + toml.load("pyproject.toml")["project"]["version"])')
            if [ $? -ne 0 ]; then exit 1; fi
            echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Build PyPI package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
      - name: Authenticate with Prefix.dev
        run: pixi auth login --token ${{ secrets.PREFIX_API_KEY }} https://prefix.dev
      - name: Build and publish to Prefix.dev
        run: pixi publish --target-channel https://prefix.dev/${{ secrets.PREFIX_CHANNEL_NAME }}
      - name: Create a Release
        uses: elgohr/Github-Release-Action@v5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: Release ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
