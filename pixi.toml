[workspace]
authors = ["Willow Ahrens <willow.marie.ahrens@gmail.com>"]
channels = ["conda-forge"]
description = "Sparse And Structured Tensor Programming"
name = "finch-tensor-lite"
platforms = ["linux-64", "osx-arm64", "win-64"]
version = "0.1.0"
preview = ["pixi-build"]

[environments]
test = { features = ["test"], solve-group = "default" }
test-c = { features = ["test", "c"], solve-group = "default" }
mindeps = { features = ["test", "mindeps"], solve-group = "default" }
benchmark = { features = ["test", "benchmark"], solve-group = "default" }
c = { features = ["c"], solve-group = "default" }
c-gcc = { features = ["c-gcc"], solve-group = "default" }
c-clang = { features = ["c-clang"], solve-group = "default" }
pre-commit = { features = ["pre-commit"], no-default-feature = true }

# finch-tensor-lite package definition #

[package.build.backend]
name = "pixi-build-python"
version = "*"

[package.host-dependencies]
python = ">=3.10,<3.13"
setuptools = "*"

[package.run-dependencies]
numpy = "*"
numba = "*"
donfig = "*"
lark = "*"

# default feature definition #

[dependencies]
finch-tensor-lite.path = "."

[dev]
# pulls in host and run dependencies
finch-tensor-lite.path = "."

[tasks]
compile = "python -c 'import finchlite'"

# non-default feature definitions #

[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
sparse = "*"
scipy = "*"
mypy = "*"
pytest-mypy = "*"
pytest-regressions = "*"

[feature.test.tasks.test]
cmd = "pytest -m 'not c_backend'"
depends-on = ["compile"]
default-environment = "test"

[feature.test.tasks.test-c]
cmd = "pytest -m c_backend"
depends-on = ["compile"]
default-environment = "test-c"

[feature.test.tasks.type-check]
cmd = "mypy ."
default-environment = "test"

[feature.mindeps.dependencies]
python = "3.11.*"

[feature.benchmark.dependencies]
pytest-codspeed = "*"

[feature.c.dependencies]
c-compiler = "*"

[feature.c-gcc.dependencies]
gcc = "*"

[feature.c-gcc.activation.env]
CC = "gcc"

[feature.c-clang.dependencies]
clang = "*"

[feature.c-clang.activation.env]
CC = "clang"

[feature.pre-commit.dependencies]
pre-commit = "*"

[feature.pre-commit.tasks]
pre-commit-install = "pre-commit install"
pre-commit = "pre-commit run -a"
