[workspace]
authors = ["Willow Ahrens <willow.marie.ahrens@gmail.com>"]
channels = ["conda-forge"]
description = "Sparse And Structured Tensor Programming"
name = "finch-tensor-lite"
platforms = ["linux-64", "osx-arm64", "win-64"]
version = "0.1.0"

[tasks]
compile = "python -c 'import finchlite'"

[dependencies]
python = ">=3.11,<3.14"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[pypi-dependencies]
finch-tensor-lite = { path = ".", editable = true, extras = ["test", "benchmark"] }

[feature.test.tasks]
test = { cmd = "pytest", depends-on = ["compile"] }
benchmark = { cmd = "pytest --codspeed benchmarks/", depends-on = ["compile"] }
type-check = { cmd = "mypy ." }

[environments]
test = ["test"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
