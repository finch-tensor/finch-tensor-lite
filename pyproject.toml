[project]
name = "finch-tensor-lite"
description = ""
version = "0.5.1"
readme = "README.md"
authors = [{name = "Willow Ahrens", email = "willow.marie.ahrens@gmail.com"}]
requires-python = '>=3.11,<3.14'
dependencies = ['numpy>=1.19,<2.4', 'numba>=0.61,<0.63.1', 'donfig>=0.8.1.post1,<0.9.0', "lark (>=1.3.0,<2.0.0)"]

[project.optional-dependencies]
test = [
    "pytest>=7.4.4,<7.6",
    "pytest-json-report>=1.5.0,<1.6",
    "hypothesis>=6.130.5,<7",
    "ndindex>=1.8,<2",
    "pre-commit>=3.6.0,<3.9",
    "pytest-cov>=4.1.0,<4.2",
    "sparse>=0.17.0,<0.17.1",
    "scipy>=1.7,<1.17",
    "mypy==1.15.*",
    "pytest-mypy==1.*",
    "pytest-regressions~=2.8.1",
]
benchmark = [
    "pytest-codspeed>=5",
]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]
preview = ["pixi-build"]
requires-pixi = ">=0.71.0"

[tool.pixi.environments]
test = { features = ["test"], solve-group = "default" }
test-c = { features = ["test", "c"], solve-group = "default" }
mindeps = { features = ["test", "mindeps"], solve-group = "default" }
benchmark = { features = ["test", "benchmark"], solve-group = "default" }
c = { features = ["c"], solve-group = "default" }
c-gcc = { features = ["c-gcc"], solve-group = "default" }
c-clang = { features = ["c-clang"], solve-group = "default" }
pre-commit = { features = ["pre-commit"], no-default-feature = true }

[tool.pixi.package.build.backend]
name = "pixi-build-python"
version = "*"

[tool.pixi.package.host-dependencies]
python = ">=3.10,<3.13"
setuptools = "*"

[tool.pixi.package.run-dependencies]
numpy = "*"
numba = "*"
donfig = "*"
lark = "*"

[tool.pixi.dependencies]
finch-tensor-lite.path = "."

[tool.pixi.dev]
finch-tensor-lite.path = "."

[tool.pixi.tasks]
compile = "python -c 'import finchlite'"

[tool.pixi.feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
sparse = "*"
scipy = "*"
mypy = "*"
pytest-mypy = "*"
pytest-regressions = "*"

[tool.pixi.feature.test.tasks.test]
cmd = "pytest -m 'not c_backend'"
depends-on = ["compile"]
default-environment = "test"

[tool.pixi.feature.test.tasks.test-c]
cmd = "pytest -m c_backend"
depends-on = ["compile"]
default-environment = "test-c"

[tool.pixi.feature.test.tasks.type-check]
cmd = "mypy ."
default-environment = "test"

[tool.pixi.feature.mindeps.dependencies]
python = "3.11.*"

[tool.pixi.feature.benchmark.dependencies]
pytest-codspeed = "*"

[tool.pixi.feature.c.dependencies]
c-compiler = "*"

[tool.pixi.feature.c-gcc.dependencies]
gcc = "*"

[tool.pixi.feature.c-gcc.activation.env]
CC = "gcc"

[tool.pixi.feature.c-clang.dependencies]
clang = "*"

[tool.pixi.feature.c-clang.activation.env]
CC = "clang"

[tool.pixi.feature.pre-commit.dependencies]
pre-commit = "*"

[tool.pixi.feature.pre-commit.tasks]
pre-commit-install = "pre-commit install"
pre-commit = "pre-commit run -a"


[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
finchlite = ["py.typed"]

[tool.ruff]
extend-exclude = [
    "tests/reference",
    "src/finchlite/codegen/stc",
]
line-length = 88

[tool.ruff.lint]
select = ["F", "E", "W", "I", "B", "UP", "YTT", "BLE", "C4", "T10", "ISC", "ICN", "PIE", "PYI", "RSE", "RET", "SIM", "PGH", "FLY", "NPY", "PERF", "RUF022", "TID"]
ignore = ["PYI024"]

[tool.ruff.lint.isort.sections]
numpy = ["numpy", "numpy.*", "scipy", "scipy.*"]
pytest = ["pytest", "pytest.*"]

[tool.ruff.format]
quote-style = "double"
docstring-code-format = true

[tool.ruff.lint.isort]
section-order = [
    "future",
    "standard-library",
    "pytest",
    "numpy",
    "third-party",
    "first-party",
    "local-folder",
]

[tool.mypy]
ignore_missing_imports = true
exclude = ["tests/reference", "src/finchlite/codegen/stc", "(^|/)benchmarks/"]
